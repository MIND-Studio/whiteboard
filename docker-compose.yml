# whiteboard — dev compose
#
# Single CommunitySolidServer v7 instance on port 3111 hosting both demo
# personas (alice and bob). Optional: the default OIDC issuer is the production
# pod (pod.mindpods.org) for SSO across siblings, so you only need this for
# fully-offline development — point NEXT_PUBLIC_SOLID_ISSUER=http://localhost:3111/
# to use it.
#
# Ports use the 311x band to coexist with sibling prototypes (300x–310x are all
# taken; 310x is shell):
#   - whiteboard   311x  ← this stack (3110 app + 3111 CSS, 3112 relay)
#
# Data persists in ./.css-data (gitignored). The relay (:3112) is a separate
# ephemeral process started with `npm run relay` — it is NOT in this compose
# because it holds no durable state.

services:
  css:
    image: solidproject/community-server:latest
    container_name: mind-whiteboard-css
    ports:
      - "3111:3111"
    volumes:
      - ./.css-data:/data
      - ./infra/css/seed.json:/seed.json:ro
    command:
      - --port=3111
      - --baseUrl=http://localhost:3111/
      - --rootFilePath=/data
      - --config=@css:config/file.json
      - --seedConfig=/seed.json
      - --loggingLevel=warn
    restart: unless-stopped
