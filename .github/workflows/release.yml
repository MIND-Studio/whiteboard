# Build the prod images on every `v*` tag (or manual run) and push to GHCR.
# mind-whiteboard ships TWO images:
#   • mind-whiteboard        — the Next.js app (needs @mind-studio/* + build-args)
#   • mind-whiteboard-relay  — the ephemeral y-websocket relay (public deps only)
#
# The infra repo (mind-studio/mindpods-infra) then pins BOTH printed @sha256
# digests in images.env and rolls the stack.
#
#   git tag v0.1.0 && git push --tags
#
# GHCR auth uses the built-in GITHUB_TOKEN (needs Actions → Workflow
# permissions → read+write packages). The same token installs the public
# @mind-studio/* packages from GitHub Packages during the app's `npm ci`.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "git ref to build (tag or branch)"
        required: true
        default: "main"

permissions:
  contents: read
  packages: write

env:
  # Run JS actions (checkout, docker/*) on Node 24 - silences the Node-20
  # deprecation warning. Becomes the default after 2026-06-16.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io

jobs:
  # ====================================================================
  # App image — mind-whiteboard
  # ====================================================================
  app:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: mind-whiteboard
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app
          build-args: |
            NEXT_PUBLIC_SOLID_ISSUER=https://pods.mindpods.org/
            NEXT_PUBLIC_RELAY_URL=wss://whiteboard-relay.mindpods.org
            NEXT_PUBLIC_WHITEBOARD_NAMESPACE=mind-whiteboard
            NEXT_PUBLIC_FEEDBACK_INBOX=https://pods.mindpods.org/mind/whiteboard-feedback/
          secrets: |
            node_auth_token=${{ secrets.GITHUB_TOKEN }}

      - name: Emit digest-pinned image ref
        run: |
          IMAGE_LC="$(echo "${REGISTRY}/${{ github.repository_owner }}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          REF="${IMAGE_LC}@${{ steps.push.outputs.digest }}"
          echo "Pinned image: ${REF}"
          {
            echo "### mind-whiteboard image"
            echo '```'
            echo "MIND_WHITEBOARD_IMAGE=${REF}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ====================================================================
  # Relay image — mind-whiteboard-relay (build context: ./relay)
  # ====================================================================
  relay:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: mind-whiteboard-relay
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./relay
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=relay
          cache-to: type=gha,mode=max,scope=relay

      - name: Emit digest-pinned image ref
        run: |
          IMAGE_LC="$(echo "${REGISTRY}/${{ github.repository_owner }}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          REF="${IMAGE_LC}@${{ steps.push.outputs.digest }}"
          echo "Pinned image: ${REF}"
          {
            echo "### mind-whiteboard-relay image"
            echo '```'
            echo "MIND_WHITEBOARD_RELAY_IMAGE=${REF}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
